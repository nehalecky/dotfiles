name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 9 * * 1'  # Weekly Monday 9am UTC
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Python scripts
        run: |
          for f in .chezmoiscripts/*.py .chezmoiscripts/*.py.tmpl; do
            [ -f "$f" ] && python3 -m py_compile "$f" && echo "OK: $f"
          done
          # Lint chezmoitemplates (pure Python fragments — wrap in try block)
          for f in .chezmoitemplates/*.tmpl; do
            [ -f "$f" ] && python3 -c "
import sys
with open('$f') as fh:
    compile(fh.read(), '$f', 'exec')
print('OK: $f')
" || echo "FAIL: $f"
          done
      - name: Validate YAML
        run: |
          python3 -c "import yaml; yaml.safe_load(open('.chezmoidata.yaml'))"
          python3 -c "import yaml; yaml.safe_load(open('.chezmoiexternal.yaml'))"

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [personal, work]
        terminal: [wezterm, iterm2, default]
    steps:
      - uses: actions/checkout@v4
      - name: Install chezmoi
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/bin"
      - name: Install starship
        run: curl -sS https://starship.rs/install.sh | sh -s -- --yes
      - name: Install Python deps
        run: pip install tomli pytest pyyaml
      - name: Run tests
        env:
          PROFILE: ${{ matrix.profile }}
          TERMINAL: ${{ matrix.terminal }}
        run: |
          export PATH="$HOME/bin:$PATH"
          python3 tests/ci-test.py
