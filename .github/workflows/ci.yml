name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 9 * * 1'  # Weekly Monday 9am UTC
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Python scripts
        run: |
          for f in .chezmoiscripts/*.py .chezmoiscripts/*.py.tmpl; do
            [ -f "$f" ] && python3 -m py_compile "$f" && echo "OK: $f"
          done
          # Lint chezmoitemplates (pure Python fragments)
          for f in .chezmoitemplates/*.tmpl; do
            [ -f "$f" ] && python3 -c "compile(open('$f').read(), '$f', 'exec')" && echo "OK: $f" || echo "FAIL: $f"
          done
      - name: Validate YAML
        run: |
          python3 -c "import yaml; yaml.safe_load(open('.chezmoidata.yaml'))"
          python3 -c "import yaml; yaml.safe_load(open('.chezmoiexternal.yaml'))"

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [personal, work]
        terminal: [wezterm, iterm2, default]
    steps:
      - uses: actions/checkout@v4
      - name: Cache chezmoi
        uses: actions/cache@v4
        id: cache-chezmoi
        with:
          path: ~/bin/chezmoi
          key: chezmoi-${{ runner.os }}-2.70.2
      - name: Install chezmoi (if not cached)
        if: steps.cache-chezmoi.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/bin
          curl -fsSL "https://github.com/twpayne/chezmoi/releases/download/v2.70.2/chezmoi_2.70.2_linux_amd64.tar.gz" \
            | tar xz -C ~/bin chezmoi
      - name: Cache starship
        uses: actions/cache@v4
        id: cache-starship
        with:
          path: ~/bin/starship
          key: starship-${{ runner.os }}-1.25.0
      - name: Install starship (if not cached)
        if: steps.cache-starship.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/bin
          curl -fsSL "https://github.com/starship/starship/releases/download/v1.25.0/starship-x86_64-unknown-linux-gnu.tar.gz" \
            | tar xz -C ~/bin starship
      - name: Install Python deps
        run: pip install tomli pytest pyyaml
      - name: Run tests
        env:
          PROFILE: ${{ matrix.profile }}
          TERMINAL: ${{ matrix.terminal }}
        run: |
          export PATH="$HOME/bin:$PATH"
          python3 tests/ci-test.py
