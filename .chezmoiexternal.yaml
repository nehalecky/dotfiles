# External dependencies managed by chezmoi
# These are automatically cloned/updated when running chezmoi apply

# Prezto - Zsh framework
".zprezto":
  type: "git-repo"
  url: "https://github.com/sorin-ionescu/prezto.git"
  clone:
    args: ["--recurse-submodules"]
  refreshPeriod: "168h" # Weekly updates